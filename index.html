<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e7c86">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="汚濁負荷量">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="config.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>汚濁負荷量 自社測定データ 入力（年度版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
:root{
  --bg:#eaf0f1; --panel:#ffffff; --ink:#12262d; --muted:#5d747c; --line:#d2dde0;
  --line2:#e6eef0; --accent:#0e7c86; --accent-d:#0a5b63; --accent-w:#e6f3f4;
  --warn:#fde68a; --warn-b:#caa42a; --danger:#dc2626; --danger-w:#fde2e2;
  --ro:#f3f6f7; --shadow:0 1px 2px rgba(16,40,48,.06),0 8px 24px rgba(16,40,48,.06);
  --mono:"SFMono-Regular",ui-monospace,"Roboto Mono","Consolas","Yu Gothic",monospace;
  --jp:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Meiryo",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--jp);font-size:14px;line-height:1.45;-webkit-text-size-adjust:100%}
.wrap{max-width:1220px;margin:0 auto;padding:18px 16px 92px}
.app-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.app-head .title{display:flex;align-items:center;gap:11px}
.mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--accent),var(--accent-d));position:relative;flex:none;box-shadow:var(--shadow)}
.mark::before{content:"";position:absolute;left:6px;right:6px;top:13px;height:3px;border-radius:3px;background:rgba(255,255,255,.85);box-shadow:0 6px 0 rgba(255,255,255,.55)}
h1{font-size:17px;margin:0;letter-spacing:.02em;font-weight:700}
.sub{font-size:11.5px;color:var(--muted);margin-top:1px}
.period{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 12px;box-shadow:var(--shadow)}
.period label{font-size:11px;color:var(--muted);font-weight:600}
.period .reiwa{font-weight:700;color:var(--accent-d);font-variant-numeric:tabular-nums}
.period input,.period select{font-family:var(--jp);font-size:14px;border:1px solid var(--line);border-radius:7px;padding:4px 7px;background:#fff;color:var(--ink);font-variant-numeric:tabular-nums}
.period input{width:54px;text-align:right}

.toolbar{display:flex;align-items:center;gap:10px 14px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 13px;box-shadow:var(--shadow);margin-bottom:12px}
.statusbar{display:flex;align-items:center;gap:8px 12px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:9px 13px;box-shadow:var(--shadow);margin-bottom:10px}
.toolbar.collapsible{overflow:hidden;transition:max-height .22s ease,padding .22s ease,margin .22s ease,border-width .22s ease}
.toolbar.collapsible.collapsed{max-height:0;padding-top:0;padding-bottom:0;margin-bottom:0;border-width:0}
.ghost.tgl{font-weight:700;border-color:var(--accent);color:var(--accent-d)}
.ghost.tgl.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.tool{display:flex;align-items:center;gap:8px}
.tool .lab{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.02em}
.seg{display:inline-flex;background:var(--line2);border-radius:9px;padding:3px;gap:2px}
.seg button{border:0;background:transparent;font-family:var(--jp);font-size:12.5px;font-weight:600;color:var(--muted);padding:5px 12px;border-radius:7px;cursor:pointer;transition:.12s}
.seg button.on{background:#fff;color:var(--accent-d);box-shadow:0 1px 2px rgba(16,40,48,.12)}
.seg.dir button.on{background:var(--accent);color:#fff}
.spacer{flex:1 1 auto;min-width:8px}
.ghost{border:1px solid var(--line);background:#fff;color:var(--ink);font-family:var(--jp);font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.12s}
.ghost:hover{border-color:var(--accent);color:var(--accent-d)}
.ghost.warn:hover{border-color:var(--danger);color:var(--danger)}
.hint{font-size:11px;color:var(--muted)}
.synctool{gap:6px}
.uname{font-family:var(--jp);font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;width:120px;background:#fff;color:var(--ink)}
.syncdot{width:10px;height:10px;border-radius:50%;background:#b6c4c8;display:inline-block;flex:none;box-shadow:0 0 0 3px rgba(0,0,0,.03)}
.syncdot.ok{background:#16a34a}.syncdot.busy{background:#d9a005;animation:pulse 1s infinite}
.syncdot.off{background:#dc2626}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.whoami{font-size:12px;font-weight:700;color:var(--accent-d)}
.auth-overlay,.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(20,40,46,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:18px}
.auth-overlay.show,.modal-overlay.show{display:flex}
.auth-card{background:var(--panel);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:26px 24px;width:100%;max-width:340px;text-align:center}
.auth-mark{width:46px;height:46px;border-radius:12px;background:linear-gradient(150deg,var(--accent),var(--accent-d));margin:0 auto 12px;position:relative}
.auth-mark::before{content:"";position:absolute;left:9px;right:9px;top:18px;height:4px;border-radius:3px;background:rgba(255,255,255,.85);box-shadow:0 7px 0 rgba(255,255,255,.55)}
.auth-card h2{font-size:17px;margin:0 0 2px}
.auth-sub{font-size:12px;color:var(--muted);margin:0 0 18px}
.auth-card label{display:block;text-align:left;font-size:11px;font-weight:700;color:var(--muted);margin:10px 2px 4px}
.auth-card input{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:15px;font-family:var(--jp);color:var(--ink);background:#fff}
.auth-card input:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-w)}
.auth-btn{width:100%;justify-content:center;margin-top:16px;padding:11px}
.auth-err{color:var(--danger);font-size:12px;font-weight:600;min-height:16px;margin-top:8px;text-align:left}
.auth-note{font-size:10.5px;color:var(--muted);margin-top:12px}
.modal-card{background:var(--panel);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:560px;max-height:84vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}
.modal-x{border:0;background:transparent;font-size:22px;line-height:1;color:var(--muted);cursor:pointer}
.modal-body{padding:14px 18px;overflow:auto}
.utable{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:16px}
.utable th,.utable td{border-bottom:1px solid var(--line2);padding:7px 8px;text-align:left}
.utable th{color:var(--muted);font-size:11px}
.utable .actbtn{font-size:11px;font-weight:600;border:1px solid var(--line);background:#fff;border-radius:6px;padding:3px 8px;margin-right:5px;cursor:pointer}
.utable .actbtn.danger{color:var(--danger);border-color:#f3c4c4}
.utable .badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 6px}
.utable .badge.on{background:#dcfce7;color:#16a34a}.utable .badge.off{background:#fde2e2;color:#dc2626}
.utable .badge.admin{background:#e7f1ec;color:var(--accent-d)}
.ufrm{background:#f7fafb;border:1px solid var(--line2);border-radius:11px;padding:12px}
.ufrm-title{font-size:12px;font-weight:700;color:var(--accent-d);margin-bottom:8px}
.ufrm-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ufrm-row input,.ufrm-row select{flex:1 1 140px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--jp);background:#fff}

.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{position:relative;border:1px solid var(--line);border-bottom:0;background:#dfe8ea;color:var(--muted);font-family:var(--jp);font-weight:700;font-size:13px;padding:9px 13px 10px;border-radius:10px 10px 0 0;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:7px}
.tab:hover{background:#e9f0f1;color:var(--ink)}
.tab.on{background:var(--panel);color:var(--accent-d);box-shadow:0 -2px 0 var(--accent) inset}
.tab.sum{margin-left:8px;background:#e7f1ec;color:var(--accent-d)}
.tab.sum.on{background:var(--panel)}
.tab .cnt{font-family:var(--mono);font-size:10.5px;font-weight:700;color:#fff;background:var(--muted);border-radius:20px;min-width:18px;height:16px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
.tab.on .cnt{background:var(--accent)}
.tab .cnt.zero{background:#bcccd0}
.tab .nw{font-size:9px;color:#fff;background:var(--accent);border-radius:4px;padding:1px 4px;font-weight:800}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:0 13px 13px 13px;box-shadow:var(--shadow);overflow:hidden}
.meta{display:flex;gap:0;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:stretch}
.meta .cell{padding:8px 14px;border-right:1px solid var(--line2);flex:1 1 auto;min-width:160px}
.meta .cell:last-child{border-right:0}
.meta .k{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.03em;margin-bottom:3px}
.meta input{width:100%;border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-family:var(--jp);font-size:14px;color:var(--ink);background:#fff}
.meta input.code{font-family:var(--mono);letter-spacing:.04em}
.meta input.miss{border-color:var(--warn-b);background:#fffbeb}
.metanote{font-size:11px;color:var(--warn-b);padding:6px 14px;background:#fffbeb;border-bottom:1px solid var(--line2);display:none}
.metanote.show{display:block}

.grid-scroll{overflow:auto;max-height:60vh}
table{border-collapse:separate;border-spacing:0;width:100%;font-variant-numeric:tabular-nums}
thead th{position:sticky;top:0;z-index:3;background:#eef4f5;color:var(--ink);font-weight:700;font-size:11.5px;border-bottom:1px solid var(--line);border-right:1px solid var(--line2);padding:6px 4px;text-align:center;white-space:nowrap}
thead tr.g2 th{top:30px;font-size:10.5px;color:var(--muted);font-weight:600}
thead th .u{display:block;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:1px}
th.grp-cod{background:#e7f1ec}th.grp-tn{background:#eaeef6}th.grp-tp{background:#f4ecef}
tbody td{border-bottom:1px solid var(--line2);border-right:1px solid var(--line2);padding:0;text-align:center;height:27px}
tbody tr:hover td{background:#f7fafb}
td.fixed{background:#f4f8f9;color:var(--muted);font-family:var(--mono);font-size:11.5px;font-weight:600}
td.day-sun{color:#c0392b}td.day-sat{color:#2563a6}
td.no{position:sticky;left:0;z-index:2;background:#f0f5f6;border-right:1px solid var(--line)}
tbody tr:hover td.no{background:#e7eff1}
td input{width:100%;height:100%;border:0;background:transparent;font-family:var(--mono);font-size:12.5px;text-align:right;padding:0 8px;color:var(--ink);outline:0;min-width:62px}
td.tcol input{text-align:left;font-family:var(--jp);min-width:150px}
td input:focus{background:var(--accent-w);box-shadow:inset 0 0 0 2px var(--accent)}
td.ro{background:var(--ro)}td.ro input{color:#42606a;cursor:default}
td.warn{background:var(--warn)!important}td.warn input{color:#5a4a05}
td.over{background:var(--danger-w)!important}td.over input{color:var(--danger);font-weight:700}
td.flow input{font-weight:600}
tfoot td{position:sticky;bottom:0;background:#eef4f5;border-top:2px solid var(--line);font-family:var(--mono);font-weight:700;font-size:12px;color:var(--accent-d);padding:6px 8px;text-align:right}
tfoot td.lab{text-align:center;color:var(--muted);font-family:var(--jp);font-weight:700}

.notes{padding:10px 16px 14px;font-size:11px;color:var(--muted);line-height:1.6;border-top:1px solid var(--line2);background:#fbfdfd}
.notes b{color:var(--accent-d)}

/* summary */
.sumwrap{padding:14px 16px 18px;overflow:auto}
.sumtitle{font-weight:700;font-size:15px;margin-bottom:3px}
.sumsub{font-size:11.5px;color:var(--muted);margin-bottom:12px}
table.sum{border-collapse:separate;border-spacing:0;font-variant-numeric:tabular-nums;min-width:760px}
table.sum th,table.sum td{border-bottom:1px solid var(--line2);border-right:1px solid var(--line2);padding:7px 9px;font-size:12.5px;white-space:nowrap}
table.sum thead th{background:#eef4f5;font-weight:700;position:sticky;top:0;text-align:center}
table.sum td.pl{text-align:left;font-weight:700}
table.sum td.code{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:left}
table.sum td.num{text-align:right;font-family:var(--mono);cursor:pointer}
table.sum td.num:hover{background:var(--accent-w)}
table.sum td.num.zero{color:#b6c4c8}
table.sum td.yr{text-align:right;font-family:var(--mono);font-weight:700;background:#e7f1ec;color:var(--accent-d)}
table.sum tfoot td{background:#eef4f5;font-weight:700;text-align:right;font-family:var(--mono);color:var(--accent-d);position:sticky;bottom:0}
table.sum tfoot td.lab{text-align:center;font-family:var(--jp)}
table.sum td.cur{box-shadow:inset 0 0 0 2px var(--accent)}

.exportbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-top:1px solid var(--line);box-shadow:0 -6px 24px rgba(16,40,48,.12);transform:translateY(115%);transition:transform .22s ease;max-height:70vh;overflow-y:auto}
.exportbar.open{transform:translateY(0)}
.exportbar .inner{max-width:1220px;margin:0 auto;padding:9px 16px;display:flex;align-items:center;gap:9px 13px;flex-wrap:wrap}
.exportbar .bar-x{position:absolute;top:6px;right:10px;border:0;background:transparent;font-size:20px;line-height:1;color:var(--muted);cursor:pointer;padding:2px 6px}
.ex-fab{position:fixed;right:16px;bottom:16px;z-index:31;border:0;border-radius:26px;background:var(--accent);color:#fff;font-family:var(--jp);font-weight:700;font-size:14px;padding:12px 20px;cursor:pointer;box-shadow:0 6px 20px rgba(14,124,134,.4);display:inline-flex;align-items:center;gap:8px;transition:.15s}
.ex-fab:hover{background:var(--accent-d)}
.ex-fab .ic{font-size:16px;line-height:1}
.ex-fab.hide{transform:translateY(140%);opacity:0;pointer-events:none}
.vstat{font-size:11.5px;color:var(--muted);display:flex;gap:12px;align-items:center}
.vstat .chip{display:inline-flex;align-items:center;gap:5px;font-weight:700}
.vstat .dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.dot.y{background:var(--warn-b)}.dot.r{background:var(--danger)}
.btn{border:0;font-family:var(--jp);font-weight:700;font-size:12.5px;border-radius:9px;padding:9px 14px;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:7px}
.btn.primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(14,124,134,.3)}
.btn.primary:hover{background:var(--accent-d)}
.btn.single{background:#fff;border:1px solid var(--line);color:var(--accent-d)}
.btn.single:hover{border-color:var(--accent);background:var(--accent-w)}
.btn.sumx{background:#0a5b63;color:#fff}
.selwrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.selwrap .lab{font-size:11px;color:var(--muted);font-weight:700}
#selChips{display:flex;gap:5px;flex-wrap:wrap}
.chipsel{font-family:var(--jp);font-size:11.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:20px;padding:4px 11px;cursor:pointer;transition:.12s;user-select:none}
.chipsel:hover{border-color:var(--accent);color:var(--accent-d)}
.chipsel.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chipsel.on::before{content:"✓ "}
.mini{font-family:var(--jp);font-size:11px;font-weight:600;border:0;background:transparent;color:var(--accent-d);cursor:pointer;text-decoration:underline;padding:2px 4px}

#toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 8px 28px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--danger)}
@media (max-width:680px){.meta .cell{flex:1 1 50%}td input{min-width:54px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="app-head">
    <div class="title">
      <div class="mark"></div>
      <div>
        <h1>汚濁負荷量 自社測定データ 入力</h1>
        <div class="sub">年度通し管理・水量集計つき／報告様式そのまま出力</div>
      </div>
    </div>
    <div class="period">
      <label>令和</label><input type="number" id="fy" value="8" min="1" max="99">
      <span class="reiwa">年度</span>
      <label>月</label>
      <select id="month"></select>
      <span class="hint" id="cyLabel"></span>
    </div>
  </div>

  <div class="statusbar">
    <button class="ghost tgl" id="toolToggle">⚙ 入力設定 ▾</button>
    <div class="tool synctool"><span class="syncdot" id="syncDot"></span><span id="syncLab" class="hint">ローカル</span></div>
    <span class="whoami" id="whoami"></span>
    <div class="spacer"></div>
    <button class="ghost" id="adminBtn" style="display:none">ユーザー管理</button>
    <button class="ghost" id="syncNow">同期</button>
    <button class="ghost" id="logoutBtn" style="display:none">ログアウト</button>
  </div>

  <div class="toolbar collapsible collapsed" id="toolbar">
    <div class="tool">
      <span class="lab">移動方向</span>
      <div class="seg dir" id="dirSeg">
        <button data-dir="h" class="on">横移動 →</button>
        <button data-dir="v">縦移動 ↓</button>
      </div>
    </div>
    <div class="tool">
      <span class="lab">負荷量</span>
      <div class="seg" id="calcSeg">
        <button data-calc="1" class="on">自動計算</button>
        <button data-calc="0">手入力</button>
      </div>
    </div>
    <span class="hint">Enterで設定方向に移動／Tab=右／↑↓←→</span>
    <div class="spacer"></div>
    <button class="ghost" id="saveJson">下書き保存</button>
    <button class="ghost" id="loadJson">読込</button>
    <button class="ghost warn" id="clearOne">月クリア</button>
    <input type="file" id="jsonFile" accept=".json" style="display:none">
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="panel" id="panel"></div>
</div>

<div class="exportbar" id="exportbar">
  <button class="bar-x" id="barClose" aria-label="閉じる">×</button>
  <div class="inner">
    <div class="vstat" id="vstat"></div>
    <div class="spacer"></div>
    <div class="selwrap">
      <span class="lab">選択出力</span>
      <span id="selChips"></span>
      <button class="mini" id="selAll">全選択</button>
      <button class="mini" id="selClear">クリア</button>
    </div>
    <button class="btn single" id="exSel">選択を1ブックで出力</button>
    <button class="btn sumx" id="exSummary">年度 水量集計を出力</button>
    <button class="btn primary" id="exAll">月報まとめて出力（全処理場）</button>
  </div>
</div>
<button class="ex-fab" id="exFab"><span class="ic">⬆</span>出力</button>
<div id="toast"></div>

<!-- ログイン -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-mark"></div>
    <h2>汚濁負荷量 共有アプリ</h2>
    <p class="auth-sub">担当者IDとパスワードでログイン</p>
    <label>担当者ID</label>
    <input id="loginId" autocomplete="username" autocapitalize="off" spellcheck="false">
    <label>パスワード</label>
    <input id="loginPw" type="password" autocomplete="current-password">
    <div class="auth-err" id="loginErr"></div>
    <button class="btn primary auth-btn" id="loginBtn">ログイン</button>
    <div class="auth-note" id="authNote"></div>
  </div>
</div>

<!-- ユーザー管理（管理者のみ） -->
<div class="modal-overlay" id="adminModal">

const FIELDS=[
  {col:'E',dp:0,kind:'flow'},

const LIMIT={E:9999999,F:99999.9,G:99999.99,H:99999.99,I:99999.999,J:9999.99,K:9999.999};

const state={fy:8,month:5,dir:'h',autocalc:true,plant:'本郷',meta:{},store:{}};

function fyBase(fy){return 2018+fy;}
function monthYear(fy,m){return m>=4?fyBase(fy):fyBase(fy)+1;}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function round(v,dp){const f=Math.pow(10,dp);return Math.round((v+Number.EPSILON)*f)/f;}
function getMeta(p){const o=state.meta[p.key]||{};return{code:o.code??p.code,name:o.name??p.name,writer:o.writer??p.writer};}
function metaChanged(p){const m=getMeta(p);return m.code!==p.code||m.name!==p.name||m.writer!==p.writer;}

function getRecs(fy,plant,month){
  state.store[fy]=state.store[fy]||{};
  state.store[fy][plant]=state.store[fy][plant]||{};
  if(!state.store[fy][plant][month])state.store[fy][plant][month]=Array.from({length:31},()=>({}));
  return state.store[fy][plant][month];
}
function waterSum(fy,plant,month){
  const recs=getRecs(fy,plant,month);const dim=daysInMonth(monthYear(fy,month),month);
  let s=0,has=false;for(let d=0;d<dim;d++){const v=parseFloat(recs[d].E);if(isFinite(v)){s+=v;has=true;}}
  return has?s:null;
}
function yearWaterSum(fy,plant){let s=0,has=false;FYMONTHS.forEach(m=>{const v=waterSum(fy,plant,m);if(v!=null){s+=v;has=true;}});return has?s:null;}
function filledDays(fy,plant,month){const recs=getRecs(fy,plant,month);const dim=daysInMonth(monthYear(fy,month),month);let n=0;for(let d=0;d<dim;d++){if(FIELDS.some(f=>f.kind!=='load'&&(recs[d][f.col]??'')!==''))n++;}return n;}

function autoLoad(rec,lc){const f=FIELDS.find(x=>x.col===lc);const flow=parseFloat(rec.E),conc=parseFloat(rec[f.conc]);if(isFinite(flow)&&flow>0&&isFinite(conc))return round(conc*flow/1000,f.dp);return null;}
function cellDisplay(rec,col){if(state.autocalc){const f=FIELDS.find(x=>x.col===col);if(f.kind==='load'){const v=autoLoad(rec,col);return v===null?'':String(v);}}return rec[col]??'';}
function cellOut(rec,col){if(col==='L'){const t=(rec.L??'').toString().trim();return t===''?null:t;}if(state.autocalc){const f=FIELDS.find(x=>x.col===col);if(f.kind==='load')return autoLoad(rec,col);}const v=parseFloat(rec[col]);return isFinite(v)?v:null;}
function concMismatch(rec,concCol){const f=FIELDS.find(x=>x.col===concCol);const lc=f.load;const flow=parseFloat(rec.E);let load;if(state.autocalc)load=autoLoad(rec,lc);else load=parseFloat(rec[lc]);const conc=parseFloat(rec[concCol]);if(!(isFinite(flow)&&flow>0&&isFinite(load)&&isFinite(conc)&&load!==0))return false;const lo=load*0.95*1000/flow,hi=load*1.05*1000/flow;return conc<Math.min(lo,hi)||conc>Math.max(lo,hi);}
function overLimit(rec,col){const lim=LIMIT[col];if(lim==null)return false;const v=state.autocalc&&FIELDS.find(x=>x.col===col).kind==='load'?autoLoad(rec,col):parseFloat(rec[col]);return isFinite(v)&&v>lim;}

const $=s=>document.querySelector(s);
const fmt=v=>v==null?'—':Math.round(v).toLocaleString('ja-JP');

function buildMonthSelect(){const sel=$('#month');sel.innerHTML='';FYMONTHS.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m+'月';if(m===state.month)o.selected=true;sel.appendChild(o);});}
function renderTabs(){
  const wrap=$('#tabs');wrap.innerHTML='';
  PLANTS.forEach(p=>{
    const n=filledDays(state.fy,p.key,state.month);
    const b=document.createElement('button');
    b.className='tab'+(p.key===state.plant?' on':'');
    b.innerHTML=`${p.key}<span class="cnt${n?'':' zero'}">${n}</span>`;
    b.onclick=()=>{state.plant=p.key;renderPanel();renderTabs();};
    wrap.appendChild(b);
  });
  const s=document.createElement('button');
  s.className='tab sum'+(state.plant==='__sum__'?' on':'');
  s.innerHTML='集計（水量）';
  s.onclick=()=>{state.plant='__sum__';renderPanel();renderTabs();};
  wrap.appendChild(s);
}
function renderPanel(){
  $('#cyLabel').textContent=`${monthYear(state.fy,state.month)}年${state.month}月`;
  if(state.plant==='__sum__'){renderSummary();}
  else{renderPlant();}
  renderVStat();
}
function renderPlant(){
  const p=PLANTS.find(x=>x.key===state.plant);const m=getMeta(p);
  const panel=$('#panel');
  panel.innerHTML=`
   <div class="metanote ${p.isNew&&!m.code?'show':''}" id="metanote">この処理場は新規追加です。事業場コード（10桁）を入力してください。</div>
   <div class="meta">
     <div class="cell"><div class="k">事業場コード（10桁）</div><input class="code ${p.isNew&&!m.code?'miss':''}" id="mi-code" value="${esc(m.code)}" placeholder="未入力" inputmode="numeric"></div>
     <div class="cell"><div class="k">工場・事業場名</div><input id="mi-name" value="${esc(m.name)}"></div>
     <div class="cell"><div class="k">記入者名</div><input id="mi-writer" value="${esc(m.writer)}"></div>

   <div class="grid-scroll"><table id="grid">
     <thead>
       <tr><th rowspan="2" class="no">No</th><th rowspan="2">月</th><th rowspan="2">日</th>
       <th rowspan="2">水量<span class="u">m³/日【0】</span></th>
       <th colspan="2" class="grp-cod">COD</th><th colspan="2" class="grp-tn">全窒素</th><th colspan="2" class="grp-tp">全燐</th>

       <th class="grp-tp">濃度<span class="u">mg/l【2】</span></th><th class="grp-tp">負荷量<span class="u">kg/日【3】</span></th></tr>
     </thead><tbody id="body"></tbody>
     <tfoot><tr><td class="lab" colspan="3">水量 月合計</td><td id="footSum" style="text-align:right">—</td><td colspan="7" style="text-align:left;color:var(--muted);font-family:var(--jp);font-weight:600;padding-left:10px" id="footMeta"></td></tr></tfoot>
   </table></div>
   <div class="notes"><b>注1)</b> 年月日は01〜09で記入。 <b>注2)</b>【】内は小数点以下桁数。 <b>注3)</b> 濃度＝負荷量×1000÷水量（不一致は黄色）。 <b>注4)</b> 様式：広島県下水道課。</div>`;
  $('#mi-code').addEventListener('input',e=>{setMeta(p,'code',e.target.value);});

  renderGrid();
}
function setMeta(p,k,v){state.meta[p.key]=state.meta[p.key]||{};state.meta[p.key][k]=v;
  if(k==='code'){const i=$('#mi-code');const note=$('#metanote');if(i){i.classList.toggle('miss',p.isNew&&!v);}if(note)note.classList.toggle('show',p.isNew&&!v);}
  scheduleMeta(p.key);saveCacheSoon();}
function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function renderGrid(){
  const y=monthYear(state.fy,state.month),dim=daysInMonth(y,state.month);
  const recs=getRecs(state.fy,state.plant,state.month);
  const body=$('#body');body.innerHTML='';
  for(let d=0;d<31;d++){
    const day=d+1,active=day<=dim,rec=recs[d];
    const tr=document.createElement('tr');
    const dow=active?new Date(y,state.month-1,day).getDay():-1;
    const dcls=dow===0?' day-sun':dow===6?' day-sat':'';
    tr.innerHTML=`<td class="fixed no">${day}</td><td class="fixed">${active?state.month:''}</td><td class="fixed${dcls}">${active?day:''}</td>`;
    FIELDS.forEach(f=>{
      const td=document.createElement('td');const isText=f.kind==='text';const ro=state.autocalc&&f.kind==='load';
      td.className=(isText?'tcol ':'')+(f.kind==='flow'?'flow ':'')+((ro||!active)?'ro':'');
      const inp=document.createElement('input');inp.type='text';inp.inputMode=isText?'text':'decimal';
      inp.dataset.d=d;inp.dataset.col=f.col;
      inp.value=active?(ro?cellDisplay(rec,f.col):(rec[f.col]??'')):'';
      if(ro||!active)inp.readOnly=true;
      inp.addEventListener('input',onInput);inp.addEventListener('keydown',onKey);
      inp.addEventListener('paste',onPaste);inp.addEventListener('focus',e=>e.target.select());
      td.appendChild(inp);tr.appendChild(td);
    });
    body.appendChild(tr);paintRow(tr,rec,active);
  }
  updateFoot();
}
function paintRow(tr,rec,active){const tds=tr.querySelectorAll('td');FIELDS.forEach((f,i)=>{const td=tds[i+3];td.classList.remove('warn','over');if(!active)return;if(overLimit(rec,f.col))td.classList.add('over');else if(f.kind==='conc'&&concMismatch(rec,f.col))td.classList.add('warn');});}

function editableCols(){return FIELDS.filter(f=>!(state.autocalc&&f.kind==='load')).map(f=>f.col);}
function onPaste(e){const txt=(e.clipboardData||window.clipboardData).getData('text');if(!txt||(!txt.includes('\t')&&!txt.includes('\n')))return;e.preventDefault();const startD=+e.target.dataset.d,startCol=e.target.dataset.col;const order=editableCols();const sc=order.indexOf(startCol);if(sc<0)return;const rows=txt.replace(/\r/g,'').split('\n').filter((r,i,a)=>!(i===a.length-1&&r===''));const dim=daysInMonth(monthYear(state.fy,state.month),state.month);const recs=getRecs(state.fy,state.plant,state.month);rows.forEach((rl,ri)=>{const d=startD+ri;if(d>=dim)return;rl.split('\t').forEach((val,ci)=>{const c2=sc+ci;if(c2>=order.length)return;recs[d][order[c2]]=val.trim();});markDirty(state.plant,state.month,d);});scheduleFlush(state.plant,state.month);renderGrid();renderTabs();saveCacheSoon();renderVStat();toast('貼り付けました');}
function onKey(e){const d=+e.target.dataset.d,col=e.target.dataset.col;const order=editableCols();const ci=order.indexOf(col);const dim=daysInMonth(monthYear(state.fy,state.month),state.month);let nd=d,ncol=col,move=false;
  if(e.key==='Enter'){move=true;if(state.dir==='h'){if(ci<order.length-1)ncol=order[ci+1];else{ncol=order[0];nd=d+1;}}else{if(d<dim-1)nd=d+1;else{nd=0;ncol=order[(ci+1)%order.length];}}}
  else if(e.key==='Tab'){move=true;e.preventDefault();if(!e.shiftKey){if(ci<order.length-1)ncol=order[ci+1];else{ncol=order[0];nd=d+1;}}else{if(ci>0)ncol=order[ci-1];else{ncol=order[order.length-1];nd=d-1;}}}
  else if(e.key==='ArrowDown'){move=true;nd=d+1;}else if(e.key==='ArrowUp'){move=true;nd=d-1;}
  else if(e.key==='ArrowRight'&&e.target.selectionStart===e.target.value.length&&e.target.selectionStart===e.target.selectionEnd){move=true;ncol=order[Math.min(ci+1,order.length-1)];}
  else if(e.key==='ArrowLeft'&&e.target.selectionStart===0&&e.target.selectionStart===e.target.selectionEnd){move=true;ncol=order[Math.max(ci-1,0)];}
  if(!move)return;if(e.key==='Enter')e.preventDefault();if(nd<0||nd>=dim)return;focusCell(nd,ncol);}

  const t=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  l.textContent= s==='ok'?`同期済 ${t}`: s==='busy'?'同期中…': s==='off'?'オフライン（保留中）': s==='loading'?'読込中…':'ローカル';}

// dirty 管理
function markDirty(plant,month,idx){const k=keyOf(plant,month);(state.dirty[k]=state.dirty[k]||new Set()).add(idx);}
const flushTimers={};
function scheduleFlush(plant,month){if(!HAS_BACKEND)return;const k=keyOf(plant,month);clearTimeout(flushTimers[k]);flushTimers[k]=setTimeout(()=>flush(plant,month),700);}
async function flush(plant,month){
  if(!HAS_BACKEND)return;const k=keyOf(plant,month);const dirty=state.dirty[k];if(!dirty||!dirty.size)return;
  const recs=getRecs(state.fy,plant,month);const sent=[...dirty];const changed={};sent.forEach(i=>changed[i]=recs[i]||{});
  setSync('busy');
  try{
    const r=await api('saveDays',{fy:state.fy,plant,month,changedDays:changed});
    if(r&&r.ok){
      state.online=true;sent.forEach(i=>dirty.delete(i));
      const server=normGrid(r.grid);
      const merged=server.map((g,i)=>(dirty.has(i)?(recs[i]||{}):g));
      state.store[state.fy][plant][month]=merged;state.revs[k]=r.rev;saveCacheSoon();
      if(isActiveGrid(plant,month))repaintActive();renderTabs();renderVStat();if(state.plant==='__sum__')renderSummary();
      setSync('ok');if(dirty.size)scheduleFlush(plant,month);
    }else setSync('off');
  }catch(e){state.online=false;setSync('off');}
}
function flushAll(){if(!HAS_BACKEND)return;Object.keys(state.dirty).forEach(k=>{const s=state.dirty[k];if(s&&s.size){const[fy,plant,month]=k.split('__');if(+fy===state.fy)flush(plant,+month);}});}

// サーバー → 自分（変更分のみ受信）
async function pullLoop(){
  if(!HAS_BACKEND)return;
  try{
    const r=await api('pull',{fy:state.fy,revs:state.revs});
    if(r&&r.ok){
      state.online=true;let touched=false,any=false;
      Object.keys(r.changed||{}).forEach(key=>{const o=r.changed[key];const plant=o.plant,month=Number(o.month);const dk=state.dirty[key];
        getRecs(state.fy,plant,month);const local=state.store[state.fy][plant][month];const server=normGrid(o.grid);
        const merged=server.map((g,i)=>(dk&&dk.has(i)?(local[i]||{}):g));
        state.store[state.fy][plant][month]=merged;state.revs[key]=o.rev;any=true;if(isActiveGrid(plant,month))touched=true;});
      if(r.meta)Object.keys(r.meta).forEach(p=>{state.meta[p]=Object.assign({},state.meta[p],r.meta[p]);});
      if(any){saveCacheSoon();renderTabs();renderVStat();if(state.plant==='__sum__')renderSummary();else if(touched)repaintActive();}
      setSync('ok');
    }
  }catch(e){state.online=false;setSync('off');}
}

  body.querySelectorAll('tr').forEach((tr,d)=>paintRow(tr,recs[d],(d+1)<=dim));updateFoot();

function b64bytes(b64){const bin=atob(b64);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
function xmlEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setCell(xml,ref,sFall,value,isText){const re=new RegExp('<c r="'+ref+'"((?:[^>]*?))(\\/>|>[\\s\\S]*?<\\/c>)');const m=xml.match(re);let s=sFall;if(m){const sm=m[1].match(/\ss="(\d+)"/);if(sm)s=sm[1];}let cell;if(value===null||value===undefined||value===''){cell=`<c r="${ref}" s="${s}"/>`;}else if(isText){cell=`<c r="${ref}" s="${s}" t="inlineStr"><is><t xml:space="preserve">${xmlEsc(value)}</t></is></c>`;}else{cell=`<c r="${ref}" s="${s}"><v>${value}</v></c>`;}return m?xml.slice(0,m.index)+cell+xml.slice(m.index+m[0].length):xml;}
function injectMeta(xml,meta){xml=setCell(xml,'B4',SFALL.B4,meta.code||'',true);xml=setCell(xml,'G4',SFALL.G4,meta.name||'',true);xml=setCell(xml,'L4',SFALL.L4,meta.writer||'',true);return xml;}
function patchSheet(xml,recs,year,month,dim){xml=setCell(xml,'B8',SFALL.B,year,false);for(let day=1;day<=31;day++){const r=7+day,d=day-1,on=day<=dim,rec=recs[d]||{};xml=setCell(xml,'C'+r,SFALL.C,on?month:null,false);xml=setCell(xml,'D'+r,SFALL.D,on?day:null,false);FIELDS.forEach(f=>{const out=on?cellOut(rec,f.col):null;xml=setCell(xml,f.col+r,SFALL[f.col],out,f.kind==='text');});}return xml;}
const PRINTER_RELS='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/printerSettings" Target="../printerSettings/printerSettings1.bin"/></Relationships>';

async function buildWorkbook(included){
  const zip=await JSZip.loadAsync(b64bytes(TEMPLATE_B64));
  const fy=state.fy,month=state.month,year=monthYear(fy,month),dim=daysInMonth(year,month);
  // 既存rels: styles/theme/sharedStrings のみ温存
  let rels=await zip.file('xl/_rels/workbook.xml.rels').async('string');
  const kept=[];const keepT=new Set(['styles.xml','theme/theme1.xml','sharedStrings.xml']);
  let mm;const rre=/<Relationship [^>]*?\/>/g;while((mm=rre.exec(rels))){const t=(mm[0].match(/Target="([^"]+)"/)||[])[1];if(keepT.has(t))kept.push(mm[0]);}
  // シート構築
  let sheetsXml='',relsSheets=[],ctOv=[],defNames=[];
  for(let i=0;i<included.length;i++){
    const p=included[i];const fileName='sheet'+p.file+'.xml';const path='xl/worksheets/'+fileName;
    let xml;
    if(p.clone){xml=await zip.file('xl/worksheets/sheet'+p.clone+'.xml').async('string');zip.file('xl/worksheets/_rels/'+fileName+'.rels',PRINTER_RELS);}
    else{xml=await zip.file(path).async('string');}
    if(p.isNew||metaChanged(p))xml=injectMeta(xml,getMeta(p));
    xml=patchSheet(xml,getRecs(fy,p.key,month),year,month,dim);
    zip.file(path,xml);
    const rid='rIdS'+(i+1);
    sheetsXml+=`<sheet name="${p.key}" sheetId="${i+1}" r:id="${rid}"/>`;
    relsSheets.push(`<Relationship Id="${rid}" Type="${WORKSHEET_TYPE}" Target="worksheets/${fileName}"/>`);
    ctOv.push(`<Override PartName="/xl/worksheets/${fileName}" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`);
    defNames.push(`<definedName name="_xlnm.Print_Area" localSheetId="${i}">${p.key}!$A$1:$L$43</definedName>`);
  }
  // 含めないテンプレシート/外部リンク/calcChain を除去
  const incFiles=new Set(included.map(p=>p.file));
  [1,2,3,4,5,6,7].forEach(k=>{if(!incFiles.has(k)){zip.remove('xl/worksheets/sheet'+k+'.xml');zip.remove('xl/worksheets/_rels/sheet'+k+'.xml.rels');}});
  zip.remove('xl/calcChain.xml');
  zip.remove('xl/externalLinks/externalLink1.xml');zip.remove('xl/externalLinks/_rels/externalLink1.xml.rels');
  zip.remove('xl/externalLinks/externalLink2.xml');zip.remove('xl/externalLinks/_rels/externalLink2.xml.rels');
  // workbook.xml
  let wb=await zip.file('xl/workbook.xml').async('string');
  wb=wb.replace(/<sheets>[\s\S]*?<\/sheets>/,'<sheets>'+sheetsXml+'</sheets>');
  wb=wb.replace(/<externalReferences>[\s\S]*?<\/externalReferences>/,'');
  wb=wb.replace(/<definedNames>[\s\S]*?<\/definedNames>/,'<definedNames>'+defNames.join('')+'</definedNames>');
  zip.file('xl/workbook.xml',wb);
  // rels
  zip.file('xl/_rels/workbook.xml.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+relsSheets.join('')+kept.join('')+'</Relationships>');
  // content types
  let ct=await zip.file('[Content_Types].xml').async('string');
  ct=ct.replace(/<Override PartName="\/xl\/worksheets\/sheet\d+\.xml"[^>]*\/>/g,'');
  ct=ct.replace(/<Override PartName="\/xl\/externalLinks\/[^"]*"[^>]*\/>/g,'');
  ct=ct.replace(/<Override PartName="\/xl\/calcChain.xml"[^>]*\/>/,'');
  ct=ct.replace('</Types>',ctOv.join('')+'</Types>');
  zip.file('[Content_Types].xml',ct);
  return zip.generateAsync({type:'blob',compression:'DEFLATE'});
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1500);}

async function exportAll(){try{const blob=await buildWorkbook(PLANTS.slice());dl(blob,`令和${state.fy}年度${state.month}月汚濁負荷量自社測定データ.xlsx`);toast('月報を出力しました（全'+PLANTS.length+'処理場）');}catch(e){console.error(e);toast('出力に失敗しました',true);}}
async function exportSelected(){
  const list=PLANTS.filter(p=>selSet.has(p.key));
  if(!list.length){toast('処理場を1つ以上選択してください',true);return;}
  try{
    const blob=await buildWorkbook(list);
    let name;
    if(list.length===1)name=`${getMeta(list[0]).name}_令和${state.fy}年${state.month}月_汚濁負荷量自社測定データ.xlsx`;
    else name=`令和${state.fy}年度${state.month}月汚濁負荷量自社測定データ_${list.map(p=>p.key).join('・')}.xlsx`;
    dl(blob,name);
    toast(`${list.length}処理場を1ブックで出力しました`);
  }catch(e){console.error(e);toast('出力に失敗しました',true);}
}

// 年度 水量集計（別シート・ExcelJS）
async function exportSummary(){
  try{
    if(typeof ExcelJS==='undefined'){toast('集計ライブラリ読込中、少し待って再実行を',true);return;}
    const fy=state.fy;const wb=new ExcelJS.Workbook();const ws=wb.addWorksheet('水量集計',{views:[{state:'frozen',xSplit:2,ySplit:2}]});
    const FONT={name:'ＭＳ Ｐゴシック',size:11};
    const thin={style:'thin',color:{argb:'FFB9C9CE'}};const border={top:thin,left:thin,bottom:thin,right:thin};
    ws.mergeCells(1,1,1,2+FYMONTHS.length+1);
    const t=ws.getCell(1,1);t.value=`令和${fy}年度　水量集計（m³）`;t.font={name:FONT.name,size:13,bold:true};t.alignment={vertical:'middle'};
    ws.getRow(1).height=24;
    const hdr=['処理場','事業場コード',...FYMONTHS.map(m=>m+'月'),'年度合計'];
    const hrow=ws.getRow(2);hrow.values=hdr;hrow.height=20;
    hrow.eachCell(c=>{c.font={name:FONT.name,size:11,bold:true};c.alignment={horizontal:'center',vertical:'middle'};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFE7F1EC'}};c.border=border;});
    let r=3;const firstDataRow=3;
    PLANTS.forEach(p=>{
      const m=getMeta(p);const row=ws.getRow(r);
      row.getCell(1).value=p.name||p.key;row.getCell(2).value=m.code||'';
      FYMONTHS.forEach((mo,ci)=>{const v=waterSum(fy,p.key,mo);const cell=row.getCell(3+ci);cell.value=(v==null?null:Math.round(v));});
      const c1=ws.getColumn(3).letter,c2=ws.getColumn(2+FYMONTHS.length).letter;
      row.getCell(3+FYMONTHS.length).value={formula:`SUM(${c1}${r}:${c2}${r})`};
      row.eachCell({includeEmpty:true},(c,cn)=>{c.font=FONT;c.border=border;if(cn===1)c.alignment={horizontal:'left'};else if(cn===2){c.alignment={horizontal:'left'};c.numFmt='@';}else{c.alignment={horizontal:'right'};c.numFmt='#,##0';}if(cn===3+FYMONTHS.length)c.font={name:FONT.name,size:11,bold:true};});
      r++;
    });
    ws.getColumn(1).width=20;ws.getColumn(2).width=14;for(let ci=0;ci<FYMONTHS.length;ci++)ws.getColumn(3+ci).width=8.5;ws.getColumn(3+FYMONTHS.length).width=11;
    const buf=await wb.xlsx.writeBuffer();dl(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),`令和${fy}年度_水量集計.xlsx`);
    toast('年度 水量集計を出力しました');
  }catch(e){console.error(e);toast('集計出力に失敗しました',true);}
}

$('#exAll').addEventListener('click',exportAll);
$('#exSel').addEventListener('click',exportSelected);
$('#exSummary').addEventListener('click',exportSummary);
$('#selAll').addEventListener('click',()=>{PLANTS.forEach(p=>selSet.add(p.key));renderSelChips();});
$('#selClear').addEventListener('click',()=>{selSet.clear();renderSelChips();});
// 出力バー開閉
function setExportBar(open){const bar=$('#exportbar'),fab=$('#exFab');bar.classList.toggle('open',open);fab.classList.toggle('hide',open);}
$('#exFab').addEventListener('click',()=>setExportBar(true));
$('#barClose').addEventListener('click',()=>setExportBar(false));
// 入力設定（移動方向・負荷量・保存等）の開閉
$('#toolToggle').addEventListener('click',()=>{const tb=$('#toolbar'),btn=$('#toolToggle');const open=tb.classList.contains('collapsed');tb.classList.toggle('collapsed',!open);btn.classList.toggle('on',open);btn.textContent=open?'⚙ 入力設定 ▴':'⚙ 入力設定 ▾';});
// 出力実行後はスマホでは自動で閉じる（入力に戻りやすく）
['#exAll','#exSel','#exSummary'].forEach(id=>$(id).addEventListener('click',()=>{if(window.innerWidth<820)setTimeout(()=>setExportBar(false),300);}));
const selSet=new Set();
function renderSelChips(){const w=$('#selChips');w.innerHTML='';PLANTS.forEach(p=>{const b=document.createElement('span');b.className='chipsel'+(selSet.has(p.key)?' on':'');b.textContent=p.key;b.onclick=()=>{if(selSet.has(p.key))selSet.delete(p.key);else selSet.add(p.key);renderSelChips();};w.appendChild(b);});}
function toast(msg,err){const t=$('#toast');t.textContent=msg;t.className='show'+(err?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.className='',1900);}

window.addEventListener('online',()=>{state.online=true;flushAll();pullLoop();});
window.addEventListener('offline',()=>{state.online=false;setSync('off');});

let pollTimer=null;
async function startApp(){
  await bootstrapFy(state.fy);
  renderTabs();renderPanel();renderVStat();
  if(HAS_BACKEND&&SESSION){flushAll();if(!pollTimer)pollTimer=setInterval(pullLoop,12000);}
}
(async function(){
  loadCache();
  syncControls();
  if(state.plant&&state.plant!=='__sum__')selSet.add(state.plant);else selSet.add(PLANTS[0].key);
  renderTabs();renderSelChips();renderPanel();renderVStat();
  setExportBar(false);
  applyUserUI();
  if('serviceWorker' in navigator){try{await navigator.serviceWorker.register('sw.js');}catch(e){}}
  if(!HAS_BACKEND){setSync('local');showLogin();return;}            // サーバー未設定: ローカル単体
  if(SESSION){                                                      // 既存セッション検証
    try{const me=await rawApi('me',{});
      if(me&&me.ok){SESSION.user=me.user;saveSession(SESSION);applyUserUI();await startApp();return;}
      if(me&&me.ok===false){saveSession(null);showLogin();return;}
    }catch(e){ // オフライン: キャッシュで継続（再接続時に同期/必要なら再ログイン）
      setSync('off');await startApp();return;}
  }
  showLogin();
})();
</script>
